name: Build & Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Bundle .app
        run: |
          APP=SwiftTranslate.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          # Binary
          cp .build/apple/Products/Release/SwiftTranslate "$APP/Contents/MacOS/SwiftTranslate"

          # Resources from the build products
          cp -R .build/apple/Products/Release/SwiftTranslate_SwiftTranslate.bundle/Contents/Resources/ \
            "$APP/Contents/Resources/" 2>/dev/null || true

          # Info.plist
          SHORT_SHA=$(git rev-parse --short HEAD)
          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>SwiftTranslate</string>
            <key>CFBundleIdentifier</key><string>com.philippbev.SwiftTranslate</string>
            <key>CFBundleName</key><string>SwiftTranslate</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.2.0</string>
            <key>CFBundleVersion</key><string>$SHORT_SHA</string>
            <key>LSMinimumSystemVersion</key><string>15.0</string>
            <key>LSUIElement</key><true/>
            <key>NSPrincipalClass</key><string>NSApplication</string>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          mkdir dmg_staging
          cp -R SwiftTranslate.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "SwiftTranslate" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            SwiftTranslate.dmg

      - name: Delete old latest release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          gh release create "latest" SwiftTranslate.dmg \
            --title "Latest Build" \
            --latest \
            --notes "## SwiftTranslate

          ### Installation
          1. Download the \`.dmg\` below.
          2. Open it and drag **SwiftTranslate.app** to your Applications folder.
          3. On first launch, right-click → **Open** to bypass Gatekeeper (unsigned build).

          ### Requirements
          macOS 15 Sequoia or later · Apple Silicon & Intel"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
