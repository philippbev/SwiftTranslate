name: Build & Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Build app
        run: |
          xcodebuild \
            -scheme SwiftTranslate \
            -configuration Release \
            -derivedDataPath build \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find .app
        run: |
          APP_PATH=$(find build -name "SwiftTranslate.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -R "$APP_PATH" dmg_staging/SwiftTranslate.app
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "SwiftTranslate" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            SwiftTranslate.dmg

      - name: Get version
        run: |
          VERSION=$(xcodebuild -scheme SwiftTranslate -showBuildSettings 2>/dev/null \
            | grep "MARKETING_VERSION" | awk '{print $3}' | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "TAG=v${VERSION}-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Delete existing latest release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          gh release create "$TAG" SwiftTranslate.dmg \
            --title "$TAG" \
            --latest \
            --notes "$(cat <<'EOF'
          ## SwiftTranslate ${{ env.TAG }}

          ### Installation
          1. Download the `.dmg` below.
          2. Open it and drag **SwiftTranslate.app** to your Applications folder.
          3. On first launch, right-click the app → **Open** to bypass Gatekeeper (unsigned build).

          ### Requirements
          macOS 15 Sequoia or later · Apple Silicon & Intel
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
